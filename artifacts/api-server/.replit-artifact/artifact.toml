kind = "api"
previewPath = "/api"
title = "Python API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8000
name = "Python API Server"
paths = ["/api", "/ws"]

[services.development]
run = "cd /home/runner/workspace/artifacts/python-api && python main.py"

[services.production]

[services.production.run]
args = ["python", "/home/runner/workspace/artifacts/python-api/main.py"]

[services.production.run.env]
PORT = "8000"

[services.production.health.startup]
path = "/api/healthz"
